<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puppy Stardew - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(74, 222, 128, 0.14), transparent 34%),
        #0f1923;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .icon {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .login-container {
      position: relative;
      background: #1a2736;
      border: 1px solid #2d3f52;
      border-radius: 18px;
      padding: 48px 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .login-container::before {
      content: '';
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, transparent, #4ade80, transparent);
      opacity: 0.9;
    }

    .lang-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #2d3f52;
      background: rgba(36, 52, 71, 0.92);
      color: #cbd5e1;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .lang-toggle span {
      font-size: 13px;
      font-weight: 600;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 56px;
      height: 56px;
      color: #4ade80;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark .icon {
      width: 100%;
      height: 100%;
    }

    .login-logo h1 {
      font-size: 22px;
      color: #4ade80;
    }

    .login-logo p {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 6px;
    }

    .auth-copy {
      margin-bottom: 20px;
    }

    .auth-copy h2 {
      font-size: 21px;
      margin-bottom: 6px;
    }

    .auth-copy p {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.5;
    }

    .feedback {
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    .feedback.success {
      background: rgba(74, 222, 128, 0.14);
      border: 1px solid rgba(74, 222, 128, 0.28);
      color: #4ade80;
    }

    .loading-state {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .auth-form.hidden,
    .loading-state.hidden {
      display: none;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #243447;
      border: 1px solid #2d3f52;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #4ade80;
      box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.12);
    }

    .validation-list {
      background: rgba(15, 25, 35, 0.45);
      border: 1px solid #2d3f52;
      border-radius: 10px;
      padding: 12px 14px;
      margin: -4px 0 18px;
      display: grid;
      gap: 10px;
    }

    .rule {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #94a3b8;
      font-size: 13px;
    }

    .rule-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #64748b;
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .rule.valid { color: #4ade80; }
    .rule.valid .rule-dot {
      background: #4ade80;
      box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.12);
    }

    .rule.invalid { color: #ef4444; }
    .rule.invalid .rule-dot { background: #ef4444; }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #4ade80;
      border: none;
      border-radius: 8px;
      color: #0f1923;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .login-btn:hover { background: #22c55e; transform: translateY(-1px); }
    .login-btn:disabled {
      background: #374151;
      color: #6b7280;
      cursor: not-allowed;
      transform: none;
    }

    .login-container.success-pulse {
      animation: successPulse 0.7s ease;
    }

    @keyframes successPulse {
      0% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4); }
      50% { box-shadow: 0 20px 70px rgba(74, 222, 128, 0.25); }
      100% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4); }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 52px 22px 28px;
      }
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
    <symbol id="icon-dog" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 8.5 4.5 4.5 8 6.5" />
        <path d="M17.5 8.5 19.5 4.5 16 6.5" />
        <path d="M6 14.5c0-3.8 2.9-6.5 6-6.5s6 2.7 6 6.5c0 3.2-2.6 5.5-6 5.5s-6-2.3-6-5.5Z" />
        <path d="M9.5 13.5h.01" />
        <path d="M14.5 13.5h.01" />
        <path d="M10 17c1 .7 3 .7 4 0" />
        <path d="M12 14.6 10.8 15.7 12 16.3l1.2-.6Z" />
      </g>
    </symbol>
    <symbol id="icon-globe" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8.5" />
        <path d="M3.8 12h16.4" />
        <path d="M12 3.5c2 2 3.1 5 3.1 8.5S14 18.5 12 20.5c-2-2-3.1-5-3.1-8.5S10 5.5 12 3.5Z" />
      </g>
    </symbol>
  </svg>

  <div class="login-container" id="loginContainer">
    <button class="lang-toggle" id="langToggle" type="button">
      <svg class="icon"><use href="#icon-globe"></use></svg>
      <span id="langToggleLabel">EN</span>
    </button>

    <div class="login-logo">
      <div class="logo-mark"><svg class="icon"><use href="#icon-dog"></use></svg></div>
      <h1>Puppy Stardew Server</h1>
      <p data-i18n="login.subtitle">Server Management Panel</p>
    </div>

    <div class="auth-copy">
      <h2 id="formTitle">...</h2>
      <p id="formSubtitle">...</p>
    </div>

    <div id="feedback" class="feedback"></div>
    <div id="loadingState" class="loading-state" data-i18n="general.loading">Loading...</div>

    <form id="loginForm" class="auth-form hidden" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="password" data-i18n="login.password">Password</label>
        <input type="password" id="password" data-i18n-placeholder="login.placeholder" placeholder="Enter panel password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn" data-i18n="login.button">Login</button>
    </form>

    <form id="setupForm" class="auth-form hidden" onsubmit="handleSetup(event)">
      <div class="form-group">
        <label for="setupPassword" data-i18n="setup.password">Password</label>
        <input type="password" id="setupPassword" data-i18n-placeholder="setup.password" placeholder="Password" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword" data-i18n="setup.confirm">Confirm Password</label>
        <input type="password" id="confirmPassword" data-i18n-placeholder="setup.confirm" placeholder="Confirm Password" autocomplete="new-password" required>
      </div>
      <div class="validation-list">
        <div class="rule" id="ruleLength">
          <span class="rule-dot"></span>
          <span data-i18n="setup.minLength">Password must be at least 6 characters</span>
        </div>
        <div class="rule" id="ruleMatch">
          <span class="rule-dot"></span>
          <span data-i18n="setup.mismatch">Passwords do not match</span>
        </div>
      </div>
      <button type="submit" class="login-btn" id="setupBtn" data-i18n="setup.button" disabled>Get Started</button>
    </form>
  </div>

  <script>
    let currentMode = 'loading';
    let currentLang = detectLanguage();

    const translations = {
      zh: {
        'general.loading': '正在检查面板状态...',
        'lang.toggle': '切换语言',
        'login.subtitle': '服务器管理面板',
        'login.title': '登录管理面板',
        'login.description': '输入您设置的管理密码以继续。',
        'login.password': '密码',
        'login.placeholder': '请输入管理密码',
        'login.button': '登录',
        'login.loading': '登录中...',
        'login.failed': '登录失败',
        'login.connection': '连接失败，请确认面板服务已启动。',
        'login.redirecting': '验证通过，正在跳转...',
        'setup.title': '设置管理密码',
        'setup.subtitle': '首次使用，请设置您的管理密码',
        'setup.password': '设置密码',
        'setup.confirm': '确认密码',
        'setup.button': '开始使用',
        'setup.loading': '设置中...',
        'setup.minLength': '密码至少需要6个字符',
        'setup.mismatch': '两次输入的密码不一致',
        'setup.success': '密码设置成功！',
        'setup.failed': '设置失败',
      },
      en: {
        'general.loading': 'Checking panel status...',
        'lang.toggle': 'Switch language',
        'login.subtitle': 'Server Management Panel',
        'login.title': 'Sign In',
        'login.description': 'Enter your admin password to continue.',
        'login.password': 'Password',
        'login.placeholder': 'Enter panel password',
        'login.button': 'Login',
        'login.loading': 'Logging in...',
        'login.failed': 'Login failed',
        'login.connection': 'Connection failed. Confirm that the panel service is running.',
        'login.redirecting': 'Verified. Redirecting...',
        'setup.title': 'Set Admin Password',
        'setup.subtitle': 'First time setup - please create your admin password',
        'setup.password': 'Password',
        'setup.confirm': 'Confirm Password',
        'setup.button': 'Get Started',
        'setup.loading': 'Setting password...',
        'setup.minLength': 'Password must be at least 6 characters',
        'setup.mismatch': 'Passwords do not match',
        'setup.success': 'Password set successfully!',
        'setup.failed': 'Setup failed',
      },
    };

    function detectLanguage() {
      const saved = localStorage.getItem('panel_lang');
      if (saved === 'zh' || saved === 'en') return saved;
      return (navigator.language || '').toLowerCase().startsWith('zh') ? 'zh' : 'en';
    }

    function t(key) {
      return (translations[currentLang] && translations[currentLang][key]) || key;
    }

    function applyTranslations() {
      document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
      document.title = currentMode === 'setup' ? `Puppy Stardew - ${t('setup.title')}` : 'Puppy Stardew - Login';

      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.textContent = t(el.dataset.i18n);
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
        el.setAttribute('placeholder', t(el.dataset.i18nPlaceholder));
      });

      document.getElementById('langToggle').title = t('lang.toggle');
      document.getElementById('langToggleLabel').textContent = currentLang === 'zh' ? 'EN' : '中文';
      document.getElementById('formTitle').textContent = t(currentMode === 'setup' ? 'setup.title' : 'login.title');
      document.getElementById('formSubtitle').textContent = t(currentMode === 'setup' ? 'setup.subtitle' : 'login.description');
      updateSetupValidation();
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('loginForm').classList.toggle('hidden', mode !== 'login');
      document.getElementById('setupForm').classList.toggle('hidden', mode !== 'setup');
      applyTranslations();

      const target = mode === 'setup' ? document.getElementById('setupPassword') : document.getElementById('password');
      target.focus();
    }

    function setFeedback(message, type = 'error') {
      const feedback = document.getElementById('feedback');
      feedback.textContent = message;
      feedback.className = `feedback show ${type}`;
    }

    function clearFeedback() {
      const feedback = document.getElementById('feedback');
      feedback.className = 'feedback';
      feedback.textContent = '';
    }

    function updateSetupValidation() {
      const password = document.getElementById('setupPassword');
      const confirmPassword = document.getElementById('confirmPassword');
      const setupBtn = document.getElementById('setupBtn');

      if (!password || !confirmPassword || !setupBtn) return;

      const hasLength = password.value.length >= 6;
      const hasMatch = confirmPassword.value.length > 0 && password.value === confirmPassword.value;

      document.getElementById('ruleLength').className = `rule ${password.value ? (hasLength ? 'valid' : 'invalid') : ''}`.trim();
      document.getElementById('ruleMatch').className = `rule ${confirmPassword.value ? (hasMatch ? 'valid' : 'invalid') : ''}`.trim();

      setupBtn.disabled = !(hasLength && hasMatch);
    }

    async function request(url, options = {}) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });

      let data = {};
      try {
        data = await response.json();
      } catch (err) {
        data = {};
      }

      return { response, data };
    }

    async function verifyExistingToken() {
      const token = localStorage.getItem('panel_token');
      if (!token) return false;

      try {
        const { response } = await request('/api/auth/verify', {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (response.ok) {
          setFeedback(t('login.redirecting'), 'success');
          window.location.href = '/';
          return true;
        }
      } catch (err) {
        return false;
      }

      return false;
    }

    async function initializePage() {
      applyTranslations();

      try {
        const { response, data } = await request('/api/auth/status');
        if (!response.ok) {
          throw new Error('status failed');
        }

        if (data.needsSetup) {
          setMode('setup');
          return;
        }

        setMode('login');
        await verifyExistingToken();
      } catch (err) {
        setMode('login');
        setFeedback(t('login.connection'), 'error');
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      clearFeedback();

      const button = document.getElementById('loginBtn');
      const password = document.getElementById('password').value;
      button.disabled = true;
      button.textContent = t('login.loading');

      try {
        const { response, data } = await request('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ password }),
        });

        if (response.ok) {
          localStorage.setItem('panel_token', data.token);
          window.location.href = '/';
          return;
        }

        if (data.needsSetup) {
          setMode('setup');
          setFeedback(t('setup.subtitle'), 'error');
          return;
        }

        let message = data.error || t('login.failed');
        if (data.attemptsRemaining !== undefined) {
          message += ` (${data.attemptsRemaining})`;
        }
        setFeedback(message, 'error');
      } catch (err) {
        setFeedback(t('login.connection'), 'error');
      } finally {
        button.disabled = false;
        button.textContent = t('login.button');
      }
    }

    async function handleSetup(event) {
      event.preventDefault();
      clearFeedback();
      updateSetupValidation();

      const password = document.getElementById('setupPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const button = document.getElementById('setupBtn');

      if (button.disabled) return;

      button.disabled = true;
      button.textContent = t('setup.loading');
      let shouldRedirect = false;

      try {
        const { response, data } = await request('/api/auth/setup', {
          method: 'POST',
          body: JSON.stringify({ password, confirmPassword }),
        });

        if (!response.ok) {
          if (response.status === 403) {
            setMode('login');
          }
          setFeedback(data.error || t('setup.failed'), 'error');
        } else {
          localStorage.setItem('panel_token', data.token);
          document.getElementById('loginContainer').classList.add('success-pulse');
          setFeedback(t('setup.success'), 'success');
          shouldRedirect = true;
          setTimeout(() => {
            window.location.href = '/';
          }, 900);
        }
      } catch (err) {
        setFeedback(t('login.connection'), 'error');
      } finally {
        if (!shouldRedirect) {
          updateSetupValidation();
          button.textContent = t('setup.button');
        }
      }
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      currentLang = currentLang === 'en' ? 'zh' : 'en';
      localStorage.setItem('panel_lang', currentLang);
      applyTranslations();
    });

    document.getElementById('setupPassword').addEventListener('input', updateSetupValidation);
    document.getElementById('confirmPassword').addEventListener('input', updateSetupValidation);

    initializePage();
  </script>
</body>
</html>
